name: Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create releases and upload assets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate Drift code (if needed)
        run: dart run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Collections ${{ steps.tag.outputs.tag }}
          body: |
            ## Collections ${{ steps.tag.outputs.tag }}

            ### What's new
            - Smooth, lag-free collection table with quiet state refresh
            - No abrupt UI flashes when adding/deleting rows and columns
            - Proper autosave for all cell edits via SQLite (Drift)
            - Local-first: all data stored in SQLite, no network required
            - Improved controller lifecycle for new rows and columns

            ### Installation
            Download the APK matching your device:
            - **arm64-v8a** — modern 64-bit Android phones (recommended)
            - **armeabi-v7a** — older 32-bit Android phones
            - **x86_64** — Android emulators / x86 devices

            > **Tip:** If unsure, download the `arm64-v8a` build.
          files: |
            build/app/outputs/apk/release/app-arm64-v8a-release.apk
            build/app/outputs/apk/release/app-armeabi-v7a-release.apk
            build/app/outputs/apk/release/app-x86_64-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
